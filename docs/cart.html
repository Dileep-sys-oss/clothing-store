<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Varnika Fashion | Cart</title>
    <link rel="stylesheet" href="css/styles.css?v=20260520-2" />
  </head>
  <body>
    <div class="promo-bar">
      <div class="container">Cart ready? Order in one tap on <span class="wa-inline">WhatsApp</span></div>
    </div>
    <header>
      <div class="container navbar">
        <a class="logo" href="./">
          <span class="logo-mark">V</span>
          <span class="logo-text">Varnika</span>
          <span class="logo-sub">Fashion</span>
        </a>
        <div class="nav-center">
          <nav class="nav-links">
            <a class="nav-link" href="./">Home</a>
            <a class="nav-link" href="catalog.html">Catalog</a>
            <a class="nav-link" href="wishlist.html">Wishlist</a>
            <a class="nav-link active" href="cart.html">Cart</a>
          </nav>
          <div class="search-bar">
            <span>Search</span>
            <input type="text" placeholder="Search styles, brands" />
          </div>
        </div>
        <div class="nav-actions">
          <a class="nav-link" href="wishlist.html">Wishlist <span id="wishlist-count" class="badge">0</span></a>
          <a class="nav-link" href="cart.html">Cart <span id="cart-count" class="badge">0</span></a>
        </div>
      </div>
    </header>

    <main class="container" style="padding: 40px 0;">
      <section class="form-card">
        <h2 class="section-title">Your cart</h2>
        <div id="cart-list"></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; flex-wrap: wrap; gap: 12px;">
          <strong id="cart-total">Total: INR 0</strong>
          <button class="button primary" id="cart-whatsapp">Order on <span class="wa-inline">WhatsApp</span></button>
        </div>
      </section>
    </main>

    <script src="js/config.js?v=20260520-2"></script>
    <script src="js/store.js?v=20260520-2"></script>
    <script src="js/ui.js?v=20260520-2"></script>
    <script src="js/cart.js?v=20260520-2"></script>
  </body>
</html>
