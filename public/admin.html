<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMBO | Admin</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header>
      <div class="container navbar">
        <a class="logo" href="/">EMBO</a>
        <nav class="nav-links">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/catalog.html">Catalog</a>
          <a class="nav-link" href="/wishlist.html">Wishlist</a>
          <a class="nav-link" href="/cart.html">Cart</a>
          <a class="nav-link active" href="/admin.html">Admin</a>
        </nav>
        <div class="nav-actions">
          <a class="nav-link" href="/wishlist.html">Wishlist <span id="wishlist-count" class="badge">0</span></a>
          <a class="nav-link" href="/cart.html">Cart <span id="cart-count" class="badge">0</span></a>
        </div>
      </div>
    </header>

    <main class="container" style="padding: 40px 0;">
      <section class="form-card">
        <h2 class="section-title">Admin control</h2>
        <div class="notice">
          Static sites cannot truly protect admin access. This screen uses an admin key for
          quick edits and then exports a products JSON file you can upload to your site.
        </div>
        <div class="filters">
          <div>
            <label>Admin key</label>
            <input id="admin-key" type="password" placeholder="Enter admin key" />
          </div>
          <div style="align-self: end;">
            <button class="button secondary" id="admin-unlock">Unlock</button>
          </div>
        </div>
      </section>

      <section class="form-card" style="margin-top: 24px;">
        <h2 class="section-title">Product editor</h2>
        <form id="admin-form" class="filters">
          <input name="name" placeholder="Name" required />
          <input name="brand" placeholder="Brand" required />
          <input name="price" type="number" placeholder="Price" required />
          <input name="category" placeholder="Category" required />
          <input name="color" placeholder="Color" required />
          <input name="size" placeholder="Size" required />
          <input name="rating" type="number" step="0.1" placeholder="Rating" />
          <input name="image" placeholder="Image URL" />
          <input name="tags" placeholder="Tags" />
          <textarea name="description" rows="2" placeholder="Description" required></textarea>
        </form>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
          <button class="button primary" id="admin-save">Add product</button>
          <button class="button secondary" id="admin-export">Export JSON</button>
          <label class="button secondary" style="cursor: pointer;">
            Import JSON
            <input id="admin-import" type="file" accept="application/json" hidden />
          </label>
        </div>
      </section>

      <section style="margin-top: 28px;">
        <h2 class="section-title">Inventory</h2>
        <div id="admin-list"></div>
      </section>
    </main>

    <script src="/js/config.js"></script>
    <script src="/js/store.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
